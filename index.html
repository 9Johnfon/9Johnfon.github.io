<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARA_WEBS</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300&display=swap');

        body {
            font-family: Prompt;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 1s ease; /* Add transition for smooth background color change */
        }

        h2 {
            background-color: #fff;
            position: relative;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 1s ease-in-out forwards;
            z-index: 2; /* Set z-index to be above sun-moon-container */
            transition: background-color 1s ease; /* Add transition for smooth background color change */
        }

        .countdown {
            font-size: 1.5em;
            margin-top: 20px;
        }

        .sun-moon-container {
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 1;
        }

        .sun,
        .moon {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            animation-duration: 10s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        .sun {
            animation-name: rotateSun;
        }

        .moon {
            background-color: #d3d3d3;
            box-shadow: 0 0 30px rgba(211, 211, 211, 0.8);
            animation-name: rotateMoon;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes rotateSun {
            from {
                transform: rotate(0);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes rotateMoon {
            from {
                transform: rotate(0);
            }
            to {
                transform: rotate(-360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>
<body>
    <div class="sun-moon-container">
        <div class="sun"></div>
        <div class="moon"></div>
    </div>

    <h2 id="header">
        คะแนนสอบรอบก่อนออกยัง<br/>รอสอบปลายภาคก่อนนะหนู😋
        <div class="countdown" id="countdown"></div>
    </h2>

    <div class="stars-container">
        <canvas id="starsCanvas"></canvas>
    </div>

    <script>
        function startCountdown() {
            var countdownElement = document.getElementById('countdown');
            
            // Set the target date (March 18, 2024 at 00:00:00)
            var targetDate = new Date('March 18, 2024 00:00:00').getTime();

            function updateCountdown() {
                var currentDate = new Date().getTime();
                var timeDifference = targetDate - currentDate;

                if (timeDifference > 0) {
                    var days = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
                    var hours = Math.floor((timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    var minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));
                    var seconds = Math.floor((timeDifference % (1000 * 60)) / 1000);

                    countdownElement.textContent = `${days} days ${hours}:${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                } else {
                    countdownElement.textContent = "Expired!";
                    clearInterval(countdownInterval);
                }
            }

            updateCountdown(); // Initial call to set the content immediately

            var countdownInterval = setInterval(updateCountdown, 1000);
        }

        function updateBackground() {
            var currentHour = new Date().getHours();
            var headerElement = document.getElementById('header');

            // Change background color and add stars if it's night time
            if (currentHour < 6 || currentHour >= 18) {
                document.body.style.backgroundColor = '#111'; // Dark background color
                document.body.style.backgroundImage = 'url("path-to-stars-image.jpg")'; // Replace with your stars image
                headerElement.style.backgroundColor = '#222'; // Dark background color for h2
                headerElement.style.color = '#fff'; // White text color for h2
                createStars(); // Create stars on the canvas
            } else {
                document.body.style.backgroundColor = '#f4f4f4'; // Light background color
                document.body.style.backgroundImage = 'none';
                headerElement.style.backgroundColor = '#fff'; // Light background color for h2
                headerElement.style.color = '#000'; // Black text color for h2
                clearStars(); // Clear stars on the canvas
            }
        }

        function createStars() {
            var canvas = document.getElementById('starsCanvas');
            var context = canvas.getContext('2d');
            var numStars = 100;

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            for (var i = 0; i < numStars; i++) {
                var x = Math.random() * canvas.width;
                var y = Math.random() * canvas.height;
                var radius = Math.random() * 2;
                context.fillStyle = '#fff';
                context.beginPath();
                context.arc(x, y, radius, 0, Math.PI * 2);
                context.fill();
            }
        }

        function clearStars() {
            var canvas = document.getElementById('starsCanvas');
            var context = canvas.getContext('2d');
            context.clearRect(0, 0, canvas.width, canvas.height);
        }

        startCountdown();
        updateBackground();

        // Update background every minute to handle transitions at sunrise/sunset
        setInterval(updateBackground, 60000);
    </script>
</body>
</html>
